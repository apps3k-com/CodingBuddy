name: Enforce conventions

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  conventional-pr-title:
    name: PR title is a Conventional Commit
    runs-on: ubuntu-latest
    steps:
      - name: Check title
        env:
          TITLE: ${{ github.event.pull_request.title }}
          BODY: ${{ github.event.pull_request.body }}
        run: |
          # Squash merges turn the PR title into the commit release-please reads.
          if ! echo "$TITLE" | grep -qE '^(feat|fix|docs|chore|ci|refactor|test|perf|build|style|revert)(\([a-z0-9_-]+\))?!?: .+'; then
            echo "::error::PR title must follow Conventional Commits, e.g. 'feat: add grouped view'. Got: $TITLE"
            exit 1
          fi
          # Release PRs from release-please carry no work item. Tight match:
          # only real version titles bypass, incl. prereleases on beta.
          if echo "$TITLE" | grep -qE '^chore\((main|beta)\): release [0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            exit 0
          fi
          # The PR must link its GitHub issue with a closing keyword (Closes #N).
          if ! printf '%s\n' "$BODY" | grep -qiE '(^|[^[:alnum:]_])(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+#[0-9]+([^[:alnum:]_]|$)'; then
            echo "::error::PR body must link its issue with a closing keyword, e.g. 'Closes #12'."
            exit 1
          fi

  feature-flag-registry:
    name: Feature flags are documented
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Check FeatureFlags.swift against docs/FEATURE_FLAGS.md
        run: ./scripts/check-feature-flags.sh

  docstring-coverage:
    name: Swift docstring coverage is at least 90%
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Verify docstring checker fixtures
        run: ./scripts/test-docstring-coverage.sh
      - name: Measure repository docstring coverage
        run: ./scripts/check-docstring-coverage.sh --json

  docs-updated:
    name: Wiki sources updated for user-visible changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Require docs/wiki changes alongside app changes
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^CodingBuddy/.*\.(swift|xcstrings|storyboard|xib)$'; then
            if printf '%s\n' "$PR_BODY" | grep -qiE '(^|[[:space:]])Docs:[[:space:]]*none([[:space:]]|$)'; then
              echo "PR declares 'Docs: none' — OK."
            else
              missing_guides=""
              for guide in \
                docs/wiki/User-Guide-EN.md \
                docs/wiki/Benutzerhandbuch-DE.md
              do
                if ! printf '%s\n' "$CHANGED" | grep -Fqx "$guide"; then
                  missing_guides="$missing_guides $guide"
                fi
              done
              if [ -n "$missing_guides" ]; then
                echo "::error::User-visible app code changed without both required user guides:$missing_guides. Update both exact files or declare 'Docs: none' in the PR description."
                exit 1
              fi
              echo "App change ships with both required user guides — OK."
            fi
          else
            echo "No app code changes — OK."
          fi
